services:
  - type: worker
    name: askmela-bot
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install; npm run build:bot
    startCommand: npm run start:bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 3000
